<!DOCTYPE html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    body {font-family:Arial, Helvetica, sans-serif; padding: 20px; border-radius: 8px; width: 350px; margin: auto; justify-content: center; display: flex;}
    
    .theForm {background: rgb(255, 255, 255); padding: 25px; }

    input, select {display: block; margin: 10px; width: 100%; padding: 8px;}

    button {width: 100%; padding: 12px; background-color: rgb(92, 124, 200); cursor: pointer; border-radius: 12px;}

    .star {font-size: 28px; color:rgb(194, 194, 194); cursor: pointer;}
    .star.active {color: rgb(215, 195, 84);}

</style>
<body>
    <div class="theForm">
        <h1> Add A Movie </h1>
        <form id="movieForm">
        <label> Title: </label>
        <input type="text" id="title" required>
        <label> Year: </label>
        <input type="number" id="year" required>
        <label> Genre: </label>
        <select id="genre">
            <option value="Action">Action</option>
            <option value="Romance">Romance</option>
            <option value="Horror">Horror</option>
            <option value="Comedy">Comedy</option>
            <option value="Drama">Drama</option>
        </select>

        <label> Rating: </label>
        <div id="rating">
            <span class="star" data-value="1">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
        </div>

        <button type="submit">Add Movie</button>
    </form>

    <div id="movieList">
        <h1> Movie List </h1>
        <ul id="listItems"></ul>
    </div>
</div>
